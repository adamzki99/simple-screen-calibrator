<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screen Calibration</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0e0e0f;
      --surface: #161618;
      --border: #2a2a2d;
      --text: #e8e8ea;
      --muted: #6b6b70;
      --accent: #89cff0;
      --accent-dim: rgba(74, 222, 128, .12);
      --warn: #f87171;
      --warn-dim: rgba(248, 113, 113, .12);
    }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
    }

    header {
      width: 100%;
      max-width: 560px;
      padding: 28px 20px 0;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    header h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      margin-bottom: 1px;
      flex-shrink: 0;
      transition: box-shadow .3s;
    }

    .dot.live {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .4;
      }
    }

    main {
      width: 100%;
      max-width: 560px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .video-wrap {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      aspect-ratio: 16/9;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .crosshair {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .crosshair-ring {
      width: 48px;
      height: 48px;
      border: 1.5px solid rgba(255, 255, 255, .7);
      border-radius: 50%;
    }

    .idle-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--surface);
    }

    .idle-overlay svg {
      width: 36px;
      height: 36px;
      color: var(--muted);
    }

    .idle-overlay p {
      font-size: 13px;
      color: var(--muted);
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    button {
      font-size: 13px;
      font-weight: 600;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      padding: 10px 16px;
      transition: border-color .15s, color .15s;
      flex: 1;
    }

    #startBtn {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    #startBtn:hover {
      background: #c8c8cc;
      border-color: #c8c8cc;
    }

    #startBtn:disabled {
      background: var(--border);
      color: var(--muted);
      border-color: var(--border);
      cursor: default;
    }

    #patchBtn {
      background: transparent;
      color: var(--text);
    }

    #patchBtn:hover {
      background: var(--surface);
      border-color: #444;
    }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .metric {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
    }

    .metric-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .metric-value {
      font-family: monospace;
      font-size: 15px;
      color: var(--text);
      line-height: 1;
    }

    .swatch-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #colorSwatch {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      background: #888;
      border: 1px solid rgba(255, 255, 255, .1);
      flex-shrink: 0;
    }

    .status-card {
      grid-column: 1/-1;
      border-radius: 8px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: border-color .4s;
    }

    .status-card.ok {
      background: var(--accent-dim);
      border-color: rgba(74, 222, 128, .3);
    }

    .status-card.fail {
      background: var(--warn-dim);
      border-color: rgba(248, 113, 113, .25);
    }

    .status-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 15px;
      background: var(--border);
    }

    .status-card.ok .status-icon {
      background: rgba(74, 222, 128, .2);
    }

    .status-card.fail .status-icon {
      background: rgba(248, 113, 113, .2);
    }

    .status-text strong {
      display: block;
      font-size: 14px;
      font-weight: 600;
    }

    .status-text span {
      font-size: 12px;
      color: var(--muted);
    }

    .delta-bar-wrap {
      margin-top: 8px;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    #deltaBar {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      background: var(--warn);
      transition: width .3s;
    }

    #calibrationPatch {
      position: fixed;
      inset: 0;
      background: #ccc;
      z-index: 100;
      display: none;
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }

    #calibrationPatch.visible {
      display: flex;
    }

    #calibrationPatch p {
      font-family: monospace;
      font-size: 13px;
      color: rgba(0, 0, 0, .35);
      letter-spacing: .05em;
      user-select: none;
    }

    canvas {
      display: none;
    }
  </style>
</head>

<body>
  <header>
    <div class="dot" id="liveDot"></div>
    <h1>Screen Calibration</h1>
  </header>
  <main>
    <div class="video-wrap">
      <div class="idle-overlay" id="idleOverlay">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path
            d="M15 10l4.553-2.07A1 1 0 0121 8.82V15.18a1 1 0 01-1.447.89L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z" />
        </svg>
        <p>Camera inactive</p>
      </div>
      <video id="video" autoplay playsinline muted></video>
      <div class="crosshair" id="crosshair" style="display:none">
        <div class="crosshair-ring"></div>
      </div>
    </div>
    <div class="btn-row">
      <button id="startBtn">Start Camera</button>
      <button id="patchBtn">Show Calibration Patch</button>
    </div>
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Sampled Color</div>
        <div class="swatch-row">
          <div id="colorSwatch"></div>
          <div class="metric-value" id="hexVal">—</div>
        </div>
      </div>
      <div class="metric">
        <div class="metric-label">Instant RGB</div>
        <div class="metric-value" id="rgbVal">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">2s Avg RGB</div>
        <div class="metric-value" id="avgVal">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">ΔE Error</div>
        <div class="metric-value" id="deltaVal">—</div>
        <div class="delta-bar-wrap">
          <div id="deltaBar"></div>
        </div>
      </div>
      <div class="status-card" id="statusCard">
        <div class="status-icon" id="statusIcon">·</div>
        <div class="status-text"><strong id="statusTitle">Waiting</strong><span id="statusSub">Start the camera to
            begin</span></div>
      </div>
    </div>
  </main>
  <canvas id="canvas"></canvas>
  <div id="calibrationPatch">
  </div>

  <script>
    const TARGET = 204, TOLERANCE = 6, WINDOW_MS = 2000, SIZE = 80, RADIUS = 20, DELTA_MAX = 60;

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    canvas.width = canvas.height = SIZE;

    let samples = [];

    // Calibration patch
    const patch = document.getElementById("calibrationPatch");
    document.getElementById("patchBtn").onclick = () => { patch.classList.add("visible"); patch.requestFullscreen?.(); };
    patch.onclick = closePatch;
    document.addEventListener("keydown", e => e.key === "Escape" && closePatch());
    function closePatch() { patch.classList.remove("visible"); document.fullscreenElement && document.exitFullscreen?.(); }

    // Camera start
    document.getElementById("startBtn").addEventListener("click", async () => {
      const btn = document.getElementById("startBtn");
      btn.disabled = true; btn.textContent = "Connecting…";
      try {
        const stream = await getRearCameraStream();
        video.srcObject = stream;

        // After stream is active, apply auto exposure/WB via track constraints
        const track = stream.getVideoTracks()[0];
        if (track) {
          const caps = track.getCapabilities?.() ?? {};
          const apply = {};
          if (caps.exposureMode?.includes?.("continuous")) apply.exposureMode = "continuous";
          if (caps.whiteBalanceMode?.includes?.("continuous")) apply.whiteBalanceMode = "continuous";
          if (caps.focusMode?.includes?.("continuous")) apply.focusMode = "continuous";
          if (Object.keys(apply).length) track.applyConstraints({ advanced: [apply] }).catch(() => { });
        }

        video.play().catch(() => { });
        video.addEventListener("canplay", () => {
          document.getElementById("idleOverlay").style.display = "none";
          document.getElementById("crosshair").style.display = "flex";
          document.getElementById("liveDot").classList.add("live");
          btn.textContent = "Camera Active";
          document.getElementById("statusTitle").textContent = "Measuring";
          document.getElementById("statusSub").textContent = "Aim at the calibration patch";
          requestAnimationFrame(tick);
        }, { once: true });
        if (video.readyState >= 3) video.dispatchEvent(new Event("canplay"));
      } catch (err) {
        console.log(err);
        btn.disabled = false; btn.textContent = "Start Camera";
        document.getElementById("statusTitle").textContent = "Camera Error";
        document.getElementById("statusSub").textContent = err.message;
      }
    });

    async function getRearCameraStream() {
      const res = { width: { ideal: 1280 }, height: { ideal: 720 } };
      let devices = await navigator.mediaDevices.enumerateDevices();
      let cams = devices.filter(d => d.kind === "videoinput");
      let rear = cams.find(d => /back|rear|environment/i.test(d.label));
      if (rear) return navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: rear.deviceId }, ...res } });
      
      // Permission not yet granted, so request once to populate labels
      if (cams.some(d => !d.label)) {
        const tmp = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", ...res } });
        cams = (await navigator.mediaDevices.enumerateDevices()).filter(d => d.kind === "videoinput");
        rear = cams.find(d => /back|rear|environment/i.test(d.label));
        if (rear) { tmp.getTracks().forEach(t => t.stop()); return navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: rear.deviceId }, ...res } }); }
        return tmp;
      }
      return navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", ...res } })
        .catch(() => navigator.mediaDevices.getUserMedia({ video: true }));
    }

    function sampleCenter() {
      if (video.readyState < 2) return null;
      ctx.drawImage(video, 0, 0, SIZE, SIZE);
      const { data } = ctx.getImageData(0, 0, SIZE, SIZE);
      const cx = cy = SIZE / 2, r2 = RADIUS ** 2;
      let r = 0, g = 0, b = 0, n = 0;
      for (let y = 0; y < SIZE; y++) for (let x = 0; x < SIZE; x++) {
        if ((x - cx) ** 2 + (y - cy) ** 2 > r2) continue;
        const i = (y * SIZE + x) * 4;
        r += data[i]; g += data[i + 1]; b += data[i + 2]; n++;
      }
      return n ? { r: Math.round(r / n), g: Math.round(g / n), b: Math.round(b / n) } : null;
    }

    function avg(arr) {
      const s = arr.reduce((a, c) => ({ r: a.r + c.r, g: a.g + c.g, b: a.b + c.b }), { r: 0, g: 0, b: 0 });
      return { r: Math.round(s.r / arr.length), g: Math.round(s.g / arr.length), b: Math.round(s.b / arr.length) };
    }

    function toHex({ r, g, b }) { return "#" + [r, g, b].map(v => v.toString(16).padStart(2, "0")).join(""); }
    function delta({ r, g, b }) { return Math.sqrt((r - TARGET) ** 2 + (g - TARGET) ** 2 + (b - TARGET) ** 2); }
    function inRange({ r, g, b }) { return [r, g, b].every(v => Math.abs(v - TARGET) < TOLERANCE); }

    function tick() {
      const color = sampleCenter();
      if (!color) { requestAnimationFrame(tick); return; }

      const hex = toHex(color);
      document.getElementById("hexVal").textContent = hex.toUpperCase();
      document.getElementById("rgbVal").textContent = `${color.r}, ${color.g}, ${color.b}`;
      document.getElementById("colorSwatch").style.background = hex;

      const now = Date.now();
      samples.push({ ...color, time: now });
      samples = samples.filter(s => now - s.time < WINDOW_MS);

      const a = avg(samples);
      const d = delta(a);
      const ok = inRange(a);

      document.getElementById("avgVal").textContent = `${a.r}, ${a.g}, ${a.b}`;
      document.getElementById("deltaVal").textContent = d.toFixed(1);
      document.getElementById("deltaBar").style.width = Math.min(d / DELTA_MAX * 100, 100) + "%";
      document.getElementById("deltaBar").style.background = d < 20 ? "#4ade80" : d < 40 ? "#facc15" : "#f87171";

      const card = document.getElementById("statusCard");
      card.className = "status-card " + (ok ? "ok" : "fail");
      document.getElementById("statusIcon").textContent = ok ? "\u{2713}" : "\u{2715}";
      document.getElementById("statusTitle").textContent = ok ? "Calibrated" : "Out of Range";
      document.getElementById("statusSub").textContent = ok
        ? `\u{394}E ${d.toFixed(1)} — within ±${TOLERANCE} tolerance`
        : `\u{394}E ${d.toFixed(1)} — target RGB ${TARGET}, ${TARGET}, ${TARGET}`;

      requestAnimationFrame(tick);
    }
  </script>
</body>

</html>
